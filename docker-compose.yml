services:
  cowrie:
    build: ./cowrie
    container_name: cowrie
    restart: unless-stopped
    volumes:
      - cowrie-logs:/cowrie/cowrie-git/var/log/cowrie
    ports:
      - "${SSH_PORT:-22}:2222"
    networks:
      - honeypot-net

  opencanary:
    build: ./opencanary
    container_name: opencanary
    restart: unless-stopped
    volumes:
      - opencanary-logs:/var/log/opencanary
    ports:
      - "${HTTP_PORT:-80}:80"
      - "${MYSQL_PORT:-3306}:3306"
    networks:
      - honeypot-net

  log-collector:
    build: ./log-collector
    container_name: log-collector
    restart: unless-stopped
    volumes:
      - cowrie-logs:/var/log/cowrie:ro
      - opencanary-logs:/var/log/opencanary:ro
      - collector-offsets:/var/offsets
    environment:
      POSTGRES_HOST: postgres
      POSTGRES_DB: honeypot
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      COWRIE_LOG: /var/log/cowrie/cowrie.json
      OPENCANARY_LOG: /var/log/opencanary/opencanary.log
      OFFSETS_DIR: /var/offsets
      POLL_INTERVAL: "2"
    depends_on:
      - postgres
    networks:
      - honeypot-net

  postgres:
    build: ./postgres
    container_name: postgres
    restart: unless-stopped
    environment:
      POSTGRES_DB: honeypot
      POSTGRES_USER: honeypot
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - postgres-data:/var/lib/postgresql/data
    networks:
      - honeypot-net

  grafana:
    build: ./grafana
    container_name: grafana
    restart: unless-stopped
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_PASSWORD:-admin}
      GF_USERS_ALLOW_SIGN_UP: "false"
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    volumes:
      - grafana-data:/var/lib/grafana
    ports:
      - "${GRAFANA_PORT:-3000}:3000"
    depends_on:
      - postgres
    networks:
      - honeypot-net

volumes:
  cowrie-logs:
  opencanary-logs:
  postgres-data:
  collector-offsets:
  grafana-data:

networks:
  honeypot-net:
    driver: bridge
